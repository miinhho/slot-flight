name: Python CI

on:
  pull_request:
    paths:
      - "packages/python/**"
      - "docs/protocol/**"
      - ".github/workflows/python-ci.yml"
      - ".github/workflows/python-release.yml"
  push:
    branches:
      - main
    paths:
      - "packages/python/**"
      - "docs/protocol/**"
      - ".github/workflows/python-ci.yml"
      - ".github/workflows/python-release.yml"

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e packages/python

      - name: Test
        run: python -m unittest discover -s packages/python/tests
