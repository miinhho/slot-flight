name: TypeScript CI

on:
  pull_request:
    paths:
      - "packages/typescript/**"
      - "docs/protocol/**"
      - ".github/workflows/typescript-ci.yml"
      - ".github/workflows/typescript-release.yml"
  push:
    branches:
      - main
    paths:
      - "packages/typescript/**"
      - "docs/protocol/**"
      - ".github/workflows/typescript-ci.yml"
      - ".github/workflows/typescript-release.yml"

permissions:
  contents: read

concurrency:
  group: typescript-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: packages/typescript
        run: bun install --frozen-lockfile

      - name: Check formatting and lint
        working-directory: packages/typescript
        run: bun run check

      - name: Typecheck
        working-directory: packages/typescript
        run: bun run typecheck

      - name: Test
        working-directory: packages/typescript
        run: bun run test

      - name: Build
        working-directory: packages/typescript
        run: bun run build
