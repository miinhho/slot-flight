name: Python Release

on:
  push:
    tags:
      - "python-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: python-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e packages/python

      - name: Test
        run: python -m unittest discover -s packages/python/tests

      - name: Build distribution
        run: |
          python -m pip install build
          python -m build packages/python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist
