[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "slot-flight"
version = "0.1.0"
description = "Slot-wise LLM generation and server-owned JSON assembly for Python."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "slot-flight contributors" }]
keywords = ["llm", "json", "streaming", "slot-generation"]
dependencies = [
  "pydantic>=2,<3"
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.34"]
langchain = ["langchain-core>=0.3"]
openai = ["openai>=1"]
adapters = [
  "anthropic>=0.34",
  "langchain-core>=0.3",
  "openai>=1"
]

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = [
  "pytest>=8",
  "ruff>=0.8"
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"src/slot_flight/prompt.py" = ["E501"]
